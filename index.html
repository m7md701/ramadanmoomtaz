<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MK5 Ramadan</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800;900&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    overflow:hidden;
    font-family:'Cairo', sans-serif;
}

/* الفيديو */
video{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
}

/* تعتيم خفيف */
.overlay-bg{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.35);
}

/* النص */
.overlay{
    position:absolute;
    top:6%;
    width:100%;
    text-align:center;
    color:#fff;
    font-size:2.2vw;
    font-weight:900;
    letter-spacing:1px;
    text-shadow:0 0 20px rgba(0,0,0,0.8);
    animation: fadeIn 2s ease forwards;
    z-index:5;
}

.overlay span{
    display:inline-block;
    background:linear-gradient(90deg,#ffffff,#ffd700,#ffffff);
    background-size:200% 100%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation: shine 3s linear infinite;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(-20px);}
    to{opacity:1; transform:translateY(0);}
}

@keyframes shine{
    0%{background-position:200%;}
    100%{background-position:-200%;}
}
</style>
</head>

<body>

<!-- الفيديو -->
<video autoplay muted playsinline loop id="bgVideo">
    <source src="video/ramadan.mp4" type="video/mp4">
</video>

<div class="overlay-bg"></div>

<div class="overlay">
    <span id="greeting"></span>
</div>

<script>
// صباح أو مساء
const hour = new Date().getHours();
let greeting = hour < 12 ? "صباح الخير" : "مساء الخير";

document.getElementById("greeting").innerText =
greeting + "🤍 السلام عليكم ورحمة الله وبركاتة | ابو عبد الرحمن وابو علي ويصلون سلامهم العزيز لكم 🤍";

const video = document.getElementById("bgVideo");

// محاولة تشغيل الصوت تلقائي
window.addEventListener("load", () => {
    video.muted = false;
    video.play().catch(() => {
        document.body.addEventListener("click", () => {
            video.muted = false;
            video.play();
        }, { once: true });
    });
});
</script>

</body>
</html>
